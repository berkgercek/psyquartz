name: CI

on:  # yamllint disable-line rule:truthy
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      is-semver-tag: ${{ steps.check.outputs.is-semver-tag }}
      is-test-release: ${{ steps.check.outputs.is-test-release }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'release'
      - name: Check version matches
        id: check
        if: github.event_name == 'release'
        run: |
          RELEASE_NAME="${{ github.event.release.name }}"
          TAG_NAME="${{ github.event.release.tag_name }}"

          # Extract semver (X.Y.Z) from release name by stripping leading text
          RELEASE_VERSION=$(echo "$RELEASE_NAME" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          CARGO_VERSION=$(grep '^version' Cargo.toml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')

          echo "Release name: $RELEASE_NAME"
          echo "Extracted version: $RELEASE_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Tag name: $TAG_NAME"

          if [ -z "$RELEASE_VERSION" ]; then
            echo "::error::Could not extract semver from release name: $RELEASE_NAME"
            exit 1
          fi

          if [ "$RELEASE_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch! Release: $RELEASE_VERSION, Cargo.toml: $CARGO_VERSION"
            exit 1
          fi

          # Check if tag is pure semver (X.Y.Z with no leading/trailing characters)
          if echo "$TAG_NAME" | grep -qxE '[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "is-semver-tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-semver-tag=false" >> "$GITHUB_OUTPUT"
          fi

          # Check if release name starts with test-
          if echo "$RELEASE_NAME" | grep -qE '^test-'; then
            echo "is-test-release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-test-release=false" >> "$GITHUB_OUTPUT"
          fi

  pytest:
    needs: [check-version]
    strategy:
      matrix:
        runner: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: uv tool install maturin
      - run: uv sync
      - run: uv run pytest tests/


  linux:
    needs: [check-version, pytest]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto
      - name: Build no-gil wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    needs: [check-version, pytest]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-latest
            target: x86
          - runner: ubuntu-latest
            target: aarch64
          - runner: ubuntu-latest
            target: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    needs: [check-version, pytest]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  windows-no-GIL:
    needs: [check-version, pytest]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
          - runner: windows-latest
            target: x86
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14t
          architecture: ${{ matrix.platform.target }}
      - name: Build no-GIL wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-no-GIL-${{ matrix.platform.target }}
          path: dist

  macos:
    needs: [check-version, pytest]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-14
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: 'true'
      - name: Build no-gil wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    needs: [check-version, pytest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: needs.check-version.outputs.is-semver-tag == 'true'
    needs: [check-version, pytest, linux, musllinux, windows, windows-no-GIL, macos, sdist]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist/
      - run: echo "Publishing contents of dist/ to PyPI..." && ls -al dist/
      - run: uv publish

  test-release:
    name: Test Release
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      contents: read
      id-token: write
    if: needs.check-version.outputs.is-test-release == 'true'
    needs: [check-version, pytest, linux, musllinux, windows, windows-no-GIL, macos, sdist]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist/
      - run: echo "Publishing contents of dist/ to Test PyPI..." && ls -al dist/
      - run: uv publish --index testpypi
